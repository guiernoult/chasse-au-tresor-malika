
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chasse au trésor de Malika</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    width:80%;
    max-width:500px;
}

input{
    padding:10px;
    font-size:18px;
    width:80%;
    margin-top:10px;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin-top:15px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#ff6b81;
    color:white;
}

button:hover{
    background:#ff4d6d;
}

#resultat{
    margin-top:30px;
    font-size:25px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>🔎 Chasse au trésor de Malika</h1>

<p>
Hola Malika ❤️<br>
Rentre ici le code
</p>

<input id="code" placeholder="Ta réponse...">

<br>

<button onclick="verifier()">Valider</button>

<div id="resultat"></div>

</div>

<script>

function verifier(){

    let code = document.getElementById("code").value.toLowerCase().trim();

    if(code=="clef"){
        document.getElementById("resultat").innerHTML = `
            🎉 Bravo ❤️<br><br>
            Tu as gagné le droit d'ouvrir le cadeau du sac poubelle dans ta chambre !
            <br><br>
            <button onclick="suiteAventure()">
                Continuer l'aventure ➜
            </button>
        `;
    }
    else{
        document.getElementById("resultat").innerHTML = "❌ Essaie encore";
    }

}

function suiteAventure(){

    document.querySelector(".card").innerHTML = `
        <div style="padding:60px 20px;">
            <div style="font-size:80px;">🔒</div>

            <h1>Prochaine énigme disponible le</h1>

            <h2 style="color:#ff6b81; font-size:40px;">
                dimanche 28 juin 2026
            </h2>
        </div>
    `;

}

</script>

</body>
</html>
